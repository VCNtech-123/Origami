<!DOCTYPE HTML>
<html>
    <head>
		<title>House of Origami</title>
		
		<meta name="viewport" content="width=device-width, initial-scale=1.0">

		<link href="css/style.css" rel="stylesheet">
		
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Aubrey&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
		
		<link rel="icon" href="origami-images/images/icon_clean.png" type="image/x-icon">

	</head>

    <body>
        <header>
			<div class="top">
				<div class="origami_logo">
					<img src="origami-images/images/origami_logo.png" alt="Origami Logo">
				</div>
				<div class="main_nav">
					<nav class="navbtn">
						<a href="index.html">HOME</a>
						<a href="lessons.html">LESSONS</a>
						<a href="about.html">ABOUT</a>
						<a>CONTACT</a>
					</nav>
				</div>
			</div>
		</header>
        <main class="contacts_page"> 
            <section class="map_section">
                <div class="map_embed"><iframe id="map" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3267.1761361384683!2d135.79132237586387!3d35.02732326561744!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x60010903e174b777%3A0x42782836e0f1cb25!2sHakusa%20Sonso%20Hashimoto%20Kansetsu%20Garden%20%26%20Museum!5e0!3m2!1sen!2sph!4v1773414549019!5m2!1sen!2sph"  allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe></div>
            </section>

            <section class="message_section">
                <div class="message_row">
                    <h3 id="message_header">SEND US A MESSAGE</h3>
                    <form class="contact_form">
                        <div class="text_form">
                        <label class="text_label" for="name">Name</label><input class="input_section "type="text" id="name">
                        <label class="text_label" for="email">Email</label><input class="input_section "type="email" id="email">
                        <label class="text_label" for="age">Age</label><input class="input_section "type="Number" id="age">
                        </div>
                        <div class="radio_form">
                            <label>Skill Level</label>
                            <input class="radio_input" type="radio" name="skill" id="beginner"><label class="radio_label" for="beginner">Beginner</label>
                            <input class="radio_input" type="radio" name="skill" id="intermediate"><label class="radio_label" for="intermediate">Intermediate</label>
                            <input class="radio_input" type="radio" name="skill" id="master"><label class="radio_label" for="master">Master</label>
                        </div>
                        <div class="checkbox_form">
                            <label>Interests</label>
                            <input class="checkbox_button" type="checkbox" name="interests" id="animals"><label class="checkbox_label" for="animals">Animals</label>
                            <input class="checkbox_button" type="checkbox" name="interests" id="objects"><label class="checkbox_label" for="objects">Objects</label>
                            <input class="checkbox_button" type="checkbox" name="interests" id="landscapes"><label class="checkbox_label" for="landscapes">Landscapes</label>
                            <input class="checkbox_button" type="checkbox" name="interests" id="humans"><label class="checkbox_label" for="humans">Humans</label>
                            <input class="checkbox_button" type="checkbox" name="interests" id="complex"><label class="checkbox_label" for="complex">Complex</label>
                        </div>
                    </form>
                </div>
                <div class="hq_row">
                    <h3 id="hq_heading">HEADQUARTERS</h3>
                    <p class="hq_text">Hakusa Sonso Hashimoto 
                        37 Jodoji Ishibashicho, Sakyo
                        Kyoto, 606-8406, Japan
                    </p>
                    <p class="hq_text"><span class="hq_label">Phone</span>+81 723 5621 99</p>
                    <p class="hq_text"><span class="hq_label">Email</span>info@houseoforigami.org</p>
                </div>
            </section>
        </main>
    </body>
</html>
